services:
  db:
    image: postgres:18-alpine
    container_name: optima-db
    env_file:
      - backend/.env
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: optima-api
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    # Sobrescribe DATABASE_URL de backend/.env (e.g. localhost:5436 en el host) para la red de Docker.
    # ${POSTGRES_*} se leen desde un `.env` en la raíz (ver `.env.example`) o el shell cuando Compose analiza este archivo.
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      - db

volumes:
  postgres_data: